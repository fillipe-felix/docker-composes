apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: nginx
  name: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  strategy: { }
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - image: nginx
          name: nginx
          resources: { }
          env:
            - name: "ENVIRONMENT"
              value: "development"
            - name: "LOG_LEVEL"
              value: "debug"
          #readinessProbe:
          #  httpGet:
          #    path: "/"
          #    port: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80