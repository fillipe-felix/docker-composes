apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: myclaim
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  resources:
    requests:
      storage: 1Gi
  storageClassName: "" # Deixando em branco para usar o PV sem StorageClass
  volumeName: example-pv # Especificando o nome do PV para vincular diretamente