apiVersion: batch/v1
kind: CronJob
metadata:
  name: echo-command
spec:
  schedule: "*/1 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: sleep
              image: alpine
              command: [ "echo", "Comunidade devops é foda" ]
          restartPolicy: OnFailure
      ttlSecondsAfterFinished: 0
      backoffLimit: 4