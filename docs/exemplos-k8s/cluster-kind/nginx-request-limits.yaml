apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: nginx
    environment: development
  name: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  strategy: {
    type: RollingUpdate,
    rollingUpdate: {
      maxUnavailable: 1,
      maxSurge: 1
    }
  }
  template:
    metadata:
      labels:
        app: nginx
        environment: development
    spec:
      containers:
        - image: nginx
          name: nginx
          resources: {
            requests: {
              cpu: "250m",
              memory: "512Mi"
            },
            limits: {
              cpu: "500m",
              memory: "1024Mi"
            }
          }