apiVersion: v1
kind: Pod
metadata:
  labels:
    run: worker-pod
  name: worker-pod
spec:
  terminationGracePeriodSeconds: 30
  containers:
    - image: alpine
      name: alpine
      command: [ "sleep", "infinity" ]
      lifecycle:
        preStop:
          exec:
            command: [ "sh", "-c", "curl 10.244.2.12" ]